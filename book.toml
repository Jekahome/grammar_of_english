[book]
authors = ["Jeka"]
language = "en"
src = "src"
title = "Grammar of English"


[output.html]
site-url = "/grammar_of_english/"
smart-punctuation = false
no-section-label = false
additional-css = ["theme/css/theme.css","theme/css/listen.css"]
additional-js = [
    
    "src/js/general.js",
    "src/js/practice.js",
    "src/js/practice2.js",
    "src/js/practice3.js",
    "src/js/editorVoice.js",
    "src/js/editor_symbol.js",
    "src/js/listen.js",
    "src/js/textual_analysis.js",
    "src/js/compromise_v14.15.0.js"
]

[output.html.print]
enable = false    
page-break = false  

[output.html.fold]
enable = true    
level = 0         

# https://github.com/GrayJack/rs-mdbook-callouts
[preprocessor.callouts]
command = "bin/mdbook-callouts"

[build]
build-dir = "book"
create-missing = true
